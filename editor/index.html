<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Client Editor</title>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0a0a0a;--panel:#141416;--panel-2:#1c1c20;--panel-3:#232328;--line:#2c2c32;--ink:#f0f0f2;--ink-2:#a3a3a3;--ink-3:#777;--blue:#0a72ef;--pink:#de1d8d;--red:#ff5b4f;--green:#27c93f;--amber:#f59e0b;--grad:linear-gradient(90deg,#0a72ef 0%,#de1d8d 55%,#ff5b4f 100%);--send:linear-gradient(140deg,#fb6fbb 0%,#a05cf0 52%,#5a8cf6 100%);}
  *{box-sizing:border-box} html,body{margin:0;height:100%}
  body{font-family:"Geist",system-ui,Arial;background:var(--bg);color:var(--ink);display:grid;grid-template-rows:auto 1fr;height:100vh;overflow:hidden}
  .mono{font-family:"Geist Mono",ui-monospace,Menlo,monospace}
  .bar{display:flex;align-items:center;gap:7px;padding:0 12px;height:56px;border-bottom:1px solid var(--line);background:var(--panel)}
  .brand{display:flex;align-items:center;gap:8px;font-weight:600}.brand svg{width:19px;height:19px}.brand .tag{font-size:11px;color:var(--ink-3);text-transform:uppercase;letter-spacing:.08em;border-left:1px solid var(--line);padding-left:9px}
  .bar .spacer{flex:1}
  select{font:inherit;font-size:13px;background:var(--panel-2);color:var(--ink);border:0;box-shadow:inset 0 0 0 1px var(--line);border-radius:7px;padding:7px 9px;cursor:pointer}
  .badge{font-size:11px;padding:5px 10px;border-radius:999px;background:var(--panel-2);box-shadow:inset 0 0 0 1px var(--line);color:var(--ink-2);white-space:nowrap}.badge b{color:var(--ink)}.badge.warn{cursor:pointer;color:#ffd9a8;box-shadow:inset 0 0 0 1px rgba(245,158,11,.4)}
  .barbtn{font-size:13px;color:var(--ink-2);padding:7px 11px;border-radius:8px;cursor:pointer;background:var(--panel-2);box-shadow:inset 0 0 0 1px var(--line);text-decoration:none;white-space:nowrap;border:0;font-family:inherit;display:inline-flex;align-items:center;gap:6px}.barbtn:hover{color:var(--ink)}.barbtn.on{color:#fff;box-shadow:inset 0 0 0 1.5px var(--blue);background:rgba(10,114,239,.12)}
  .barbtn svg{width:15px;height:15px;flex:0 0 auto} .cz{font-size:9px;color:var(--ink-3)}
  /* overflow menu (Elementor-style) */
  .mwrap{position:relative;display:inline-flex}
  .menu{position:absolute;top:calc(100% + 8px);right:0;min-width:208px;background:var(--panel);box-shadow:0 18px 50px rgba(0,0,0,.6),inset 0 0 0 1px var(--line);border-radius:12px;padding:6px;display:none;z-index:60}
  .menu.show{display:block;animation:pop .14s ease}
  .menu button{display:flex;align-items:center;gap:10px;width:100%;text-align:left;background:transparent;border:0;color:var(--ink-2);font:inherit;font-size:13px;padding:9px 11px;border-radius:8px;cursor:pointer}
  .menu button:hover{background:var(--panel-2);color:var(--ink)} .menu button svg{width:16px;height:16px;flex:0 0 auto;opacity:.85}
  .menu button:disabled{opacity:.38;cursor:default} .menu button:disabled:hover{background:transparent;color:var(--ink-2)}
  .menu .vtag{margin-left:auto;font-size:11px;color:var(--ink-3);font-family:"Geist Mono",monospace}
  .barbtn.ghost{background:transparent}
  .barbtn:disabled{opacity:.4;cursor:default}
  .barbtn.attn{color:#fff;box-shadow:inset 0 0 0 1.5px var(--blue);background:rgba(10,114,239,.14)}
  /* primary button: white fill, gradient border, dark text */
  .btnp{border:2px solid transparent;border-radius:10px;background:linear-gradient(#fff,#fff) padding-box, var(--grad) border-box;color:#0a0a0a;font:600 13px/1 'Geist',system-ui;padding:8px 16px;cursor:pointer;transition:transform .12s,filter .12s,opacity .12s}
  .btnp:hover{filter:brightness(1.04);transform:translateY(-1px)} .btnp:active{transform:none}
  /* clean = greyed out, nothing to publish; dirty = vivid gradient-border CTA */
  .btnp:disabled{cursor:default;transform:none;filter:none;background:var(--panel-2);box-shadow:inset 0 0 0 1px var(--line);color:var(--ink-3)}
  /* grouped bar controls (segmented containers — clear visual grouping) */
  .bgrp{display:flex;align-items:center;gap:2px;background:var(--panel-2);box-shadow:inset 0 0 0 1px var(--line);border-radius:9px;padding:2px}
  .bgrp .barbtn{background:transparent;box-shadow:none;border-radius:7px;padding:6px 9px}
  .bgrp .barbtn:hover{background:var(--panel-3);color:var(--ink)}
  .bgrp .barbtn.on{color:#fff;background:rgba(10,114,239,.16);box-shadow:inset 0 0 0 1.5px var(--blue)}
  .bgrp .barbtn.ic{padding:6px;width:30px;display:inline-flex;align-items:center;justify-content:center}
  .bgrp .barbtn.ic svg{width:15px;height:15px;stroke:currentColor}
  .gdiv{width:1px;align-self:stretch;background:var(--line);margin:3px 1px}
  .ship{display:flex;align-items:center;gap:8px;margin-left:4px;padding-left:10px;border-left:1px solid var(--line)}
  .main{display:grid;grid-template-columns:1fr var(--dockw,0px) var(--chatw,480px);min-height:0;transition:grid-template-columns .22s cubic-bezier(.2,0,0,1)}
  /* docked inspector rail — sits BETWEEN the preview and the chat, never covers the chat */
  .dock{position:relative;background:#15151a;border-left:1px solid var(--line);overflow:hidden;min-width:0}
  .dock .dpanel{display:none;width:100%;height:100%;overflow-y:auto;padding:18px 18px 26px}
  .dock .dpanel.show{display:block}
  .dockclose{position:absolute;top:12px;right:12px;z-index:5;width:30px;height:30px;border:0;border-radius:8px;background:var(--panel-2);box-shadow:inset 0 0 0 1px var(--line);color:var(--ink-2);cursor:pointer;font-size:13px;display:none}
  .dock.open .dockclose{display:flex;align-items:center;justify-content:center}.dockclose:hover{color:var(--ink);background:var(--panel-3)}
  .dpanel h4{margin:0 0 12px;font-size:12px;text-transform:uppercase;letter-spacing:.07em;color:var(--ink-3);padding-right:34px}
  .rsz{position:absolute;left:-3px;top:0;bottom:0;width:6px;cursor:col-resize;z-index:8}
  .rsz::after{content:"";position:absolute;left:2px;top:50%;transform:translateY(-50%);width:4px;height:42px;border-radius:3px;background:var(--line)}
  .rsz:hover::after{background:var(--blue)}
  .preview{position:relative;background:#fff;border-right:1px solid var(--line);overflow:hidden}
  .frame-tag{position:absolute;top:12px;left:12px;z-index:5;font-size:11px;padding:5px 10px;border-radius:999px;background:rgba(10,10,10,.78);color:#fff;backdrop-filter:blur(6px)}
  iframe{width:100%;height:100%;border:0;background:#fff;transition:opacity .22s ease}
  .pbar{position:absolute;top:12px;right:12px;z-index:6;display:none;align-items:center;gap:10px;background:rgba(10,10,10,.9);backdrop-filter:blur(8px);border-radius:11px;padding:8px 8px 8px 14px;box-shadow:0 8px 30px rgba(0,0,0,.45),inset 0 0 0 1px var(--line)}
  .pbar.show{display:flex}.pbar .n{font-size:12.5px}.pbar .n b{color:#9bc1ff}
  .pbar button{height:32px;padding:0 14px;border-radius:8px;font-size:12.5px;font-weight:600;border:0;cursor:pointer}
  .pbar .pub{background:var(--grad);color:#fff}.pbar .dis{background:transparent;color:var(--ink-2);box-shadow:inset 0 0 0 1px var(--line)}
  .panel{position:absolute;top:60px;z-index:30;width:368px;max-height:78vh;overflow-y:auto;display:none;background:#1c1c22;border-radius:14px;box-shadow:0 24px 70px rgba(0,0,0,.65),inset 0 0 0 1px #34343c;padding:16px;animation:pop .14s ease}
  @keyframes pop{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:none}}
  .panel.show{display:block}.panel.left{left:14px}.panel.right{right:14px}.panel.left{width:320px}
  .panel h4{margin:0 0 10px;font-size:12px;text-transform:uppercase;letter-spacing:.07em;color:var(--ink-3)}
  .panel .foot,.seocard .foot{margin-top:14px;padding-top:12px;border-top:1px solid var(--line);display:flex;align-items:center;gap:10px;justify-content:space-between}
  .panel .foot span,.seocard .foot span{font-size:11.5px;color:var(--ink-3)}.panel .foot button,.seocard .foot button{border:2px solid transparent;background:linear-gradient(#fff,#fff) padding-box,var(--grad) border-box;color:#0a0a0a;border-radius:9px;padding:8px 16px;font-weight:600;font-size:13px;cursor:pointer}
  /* pages */
  .pg{display:flex;align-items:center;gap:10px;padding:10px 11px;border-radius:9px;cursor:pointer;margin-bottom:5px;background:var(--panel-2)}.pg:hover{background:var(--panel-3)}
  .pg.cur{background:rgba(10,114,239,.18);box-shadow:inset 0 0 0 1.5px var(--blue)}
  .pg .nm{flex:1;font-size:14px;font-weight:500}.pg.cur .nm{color:#cfe2ff}.pg .nm .pth{font-family:"Geist Mono",monospace;font-size:11px;color:var(--ink-3);font-weight:400;display:block;margin-top:1px}
  .pg .hm{font-size:10px;color:var(--green);font-weight:600}.pg .ico{cursor:pointer;color:var(--ink-3);font-size:14px;padding:4px}.pg .ico:hover{color:var(--ink)}
  .addbox{margin-top:13px;padding-top:14px;border-top:1px solid var(--line)}
  .addlbl{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-3);font-weight:600;margin-bottom:9px}
  .tplrow{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:9px}
  .tpl{display:flex;flex-direction:column;gap:2px;text-align:left;background:var(--panel-2);box-shadow:inset 0 0 0 1px var(--line);border:0;border-radius:9px;padding:9px 11px;cursor:pointer;color:var(--ink-2)}
  .tpl b{font-size:13px;color:var(--ink);font-weight:600}.tpl span{font-size:11px;color:var(--ink-3)}
  .tpl.on{box-shadow:inset 0 0 0 1.5px var(--blue);background:rgba(10,114,239,.12)}.tpl.on b{color:#cfe2ff}
  #newPage{width:100%;background:var(--panel-2);border:0;box-shadow:inset 0 0 0 1px var(--line);border-radius:9px;color:var(--ink);font:inherit;font-size:13px;padding:10px 11px;margin-bottom:9px}#newPage:focus{outline:0;box-shadow:inset 0 0 0 1.5px var(--blue)}
  .addbtn{width:100%;border:2px solid transparent;border-radius:10px;background:linear-gradient(#fff,#fff) padding-box,var(--grad) border-box;color:#0a0a0a;font:600 13px/1 'Geist',system-ui;padding:11px;cursor:pointer;transition:transform .12s,filter .12s}.addbtn:hover{filter:brightness(1.04);transform:translateY(-1px)}.addbtn:active{transform:none}
  /* SEO */
  .seoprev{background:#fff;border-radius:10px;padding:14px 16px;margin-bottom:14px}
  .seoprev .top{display:flex;align-items:center;gap:7px;margin-bottom:3px}.seoprev .fav{width:16px;height:16px;border-radius:3px;background:#e8eaed;object-fit:cover;flex:0 0 16px}
  .seoprev .u{font-size:12px;color:#4d5156}.seoprev .t{font-size:18px;color:#1a0dab;line-height:1.3;margin:2px 0;word-break:break-word}.seoprev .d{font-size:13px;color:#4d5156;line-height:1.5;word-break:break-word}
  /* SEO takeover modal */
  .seomodal{position:fixed;inset:0;z-index:120;display:none;background:rgba(6,6,9,.66);backdrop-filter:blur(4px);overflow:auto;padding:38px 20px}
  .seomodal.show{display:flex;align-items:flex-start;justify-content:center;animation:pop .16s ease}
  .seocard{background:#15151a;width:min(1000px,96vw);border-radius:20px;box-shadow:0 40px 110px rgba(0,0,0,.6),inset 0 0 0 1px #2c2c32;overflow:hidden;margin:auto 0}
  .seohead{display:flex;align-items:center;justify-content:space-between;padding:18px 24px;border-bottom:1px solid var(--line)}
  .seohead h3{margin:0;font-size:16px;font-weight:600;display:flex;align-items:center;gap:9px}.seohead .pg{font-size:12px;color:var(--ink-3);font-weight:400}
  .seoclose{width:34px;height:34px;border-radius:9px;border:0;background:var(--panel-2);box-shadow:inset 0 0 0 1px var(--line);color:var(--ink-2);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center}.seoclose:hover{color:var(--ink);background:var(--panel-3)}
  .seobody{display:grid;grid-template-columns:1fr 1fr;gap:28px;padding:24px}
  @media(max-width:860px){.seobody{grid-template-columns:1fr;gap:20px}}
  .seocol h5{font-size:11px;text-transform:uppercase;letter-spacing:.07em;color:var(--ink-3);margin:0 0 12px;font-weight:600}
  /* realistic, wide Google SERP */
  .serp{background:#fff;border-radius:12px;padding:17px 19px;max-width:600px}
  .serp .crumb{display:flex;align-items:center;gap:10px;margin-bottom:7px}
  .serp .fv{width:26px;height:26px;border-radius:50%;background:#f1f3f4;object-fit:cover;flex:0 0 26px;display:flex;align-items:center;justify-content:center;font-size:12px;color:#5f6368;font-weight:600}
  .serp .site{font-size:14px;color:#202124;line-height:1.25}.serp .site .url{font-size:12px;color:#5f6368}
  .serp .ttl{font-size:20px;line-height:1.3;color:#1a0dab;margin:3px 0;font-family:arial,sans-serif;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .serp .dsc{font-size:14px;line-height:1.57;color:#4d5156;font-family:arial,sans-serif;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
  /* Yoast-style analysis */
  .score{display:flex;align-items:center;gap:12px;background:var(--panel-2);box-shadow:inset 0 0 0 1px var(--line);border-radius:12px;padding:13px 15px;margin:0 0 14px}
  .score .light{width:30px;height:30px;border-radius:50%;flex:0 0 30px}
  .score .light.good{background:#27c93f}.score .light.improve{background:#f59e0b}.score .light.problem{background:#ff5b4f}.score .light.none{background:#555}
  .score .lbl{font-weight:600;font-size:14px}.score .sub{font-size:11.5px;color:var(--ink-3);margin-top:1px}
  .checks{display:flex;flex-direction:column;gap:1px}
  .check{display:flex;gap:10px;align-items:flex-start;font-size:12.5px;color:var(--ink-2);line-height:1.45;padding:6px 2px}
  .check .dot{width:9px;height:9px;border-radius:50%;flex:0 0 9px;margin-top:4px}
  .check .dot.good{background:#27c93f}.check .dot.improve{background:#f59e0b}.check .dot.problem{background:#ff5b4f}
  .cgrp{font-size:11px;color:var(--ink-3);font-weight:600;margin:13px 0 3px}.cgrp:first-child{margin-top:0}
  .seofields{padding:0 24px 22px}
  .grp{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-3);margin:16px 0 8px;font-weight:600}
  .adv{cursor:pointer;color:var(--ink-2);font-size:12.5px;margin:12px 0 4px;user-select:none}.adv:hover{color:var(--ink)}
  .f{margin-bottom:13px}.f label{display:flex;justify-content:space-between;font-size:12.5px;color:var(--ink);margin-bottom:5px;font-weight:500}.f .ct{font-family:"Geist Mono",monospace;font-size:11px;font-weight:400}.ct.ok{color:var(--green)}.ct.warn{color:var(--amber)}.ct.bad{color:var(--red)}
  .f input,.f textarea,.f select{width:100%;background:var(--panel-2);border:0;box-shadow:inset 0 0 0 1px var(--line);border-radius:8px;color:var(--ink);font:inherit;font-size:13px;padding:9px 11px;resize:vertical}
  .f input:focus,.f textarea:focus{outline:0;box-shadow:inset 0 0 0 1.5px var(--blue)}
  .f .hint{font-size:11.5px;color:var(--ink-3);margin-top:4px;line-height:1.45}
  .imgrow{display:flex;gap:8px;align-items:center}.imgrow input{flex:1;min-width:0}
  .thumb{width:44px;height:44px;border-radius:9px;object-fit:cover;flex:0 0 44px;background:var(--panel-3);box-shadow:inset 0 0 0 1px var(--line);display:flex;align-items:center;justify-content:center;font-size:17px}.thumb.ph{color:var(--ink-3)}
  /* inspector / style */
  .insTag{font-family:"Geist Mono",monospace;font-size:11px;color:#9bc1ff;background:rgba(10,114,239,.14);padding:2px 8px;border-radius:6px}
  /* premium dials (spacing / type) */
  .dialgrp{background:var(--panel-2);border-radius:13px;padding:15px 15px 7px;margin-bottom:11px;box-shadow:inset 0 0 0 1px var(--line)}
  .dialgrp .gt{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-3);font-weight:600;margin:0 0 14px;display:flex;align-items:center;gap:8px}
  .dialgrp .gt svg{width:14px;height:14px;opacity:.75}
  .dial{margin-bottom:14px}
  .dial .top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
  .dial .lab{font-size:12.5px;color:var(--ink-2)}
  .dial .val{font-family:"Geist Mono",monospace;font-size:11px;color:var(--ink);background:var(--panel-3);box-shadow:inset 0 0 0 1px var(--line);border-radius:6px;padding:3px 9px;min-width:46px;text-align:center}
  .rng{-webkit-appearance:none;appearance:none;width:100%;height:6px;border-radius:6px;background:linear-gradient(90deg,var(--blue) var(--fill,50%),var(--panel-3) var(--fill,50%));cursor:pointer;outline:none;display:block}
  .rng::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:#fff;box-shadow:0 1px 5px rgba(0,0,0,.55),0 0 0 1px rgba(0,0,0,.12);cursor:grab}
  .rng::-webkit-slider-thumb:active{cursor:grabbing;transform:scale(1.1)}
  .rng::-moz-range-thumb{width:16px;height:16px;border:0;border-radius:50%;background:#fff;box-shadow:0 1px 5px rgba(0,0,0,.55);cursor:grab}
  .alignbtns{display:flex;gap:6px}.alignbtns button{flex:1;height:36px;border:0;border-radius:9px;background:var(--panel-3);box-shadow:inset 0 0 0 1px var(--line);color:var(--ink-2);cursor:pointer;display:flex;align-items:center;justify-content:center}.alignbtns button.on{color:#fff;box-shadow:inset 0 0 0 1.5px var(--blue);background:rgba(10,114,239,.14)}.alignbtns svg{width:16px;height:16px}
  .selnote{font-size:13px;color:var(--ink-3);padding:10px 0;line-height:1.5}
  .seccard{background:var(--panel-2);border-radius:12px;box-shadow:inset 0 0 0 1px rgba(160,92,240,.4);padding:15px}
  .seccard .secname{font-size:15px;font-weight:600;color:#d7b6ff}.seccard p{margin:9px 0 0;font-size:13px;color:var(--ink-2);line-height:1.55}.seccard b{color:var(--ink)}
  .upbtn{width:100%;border:1.5px dashed var(--line);background:var(--panel-2);color:var(--ink);border-radius:10px;padding:14px;cursor:pointer;font:500 13px 'Geist';display:flex;align-items:center;justify-content:center;gap:8px;transition:.15s}.upbtn:hover{border-color:var(--blue);color:#fff}
  .ghost{background:var(--panel-2);color:var(--ink-2);box-shadow:inset 0 0 0 1px var(--line);border:0;border-radius:8px;cursor:pointer;font:500 13px 'Geist'}.ghost:hover{color:var(--ink)}
  .imgbig{width:100%;height:120px;object-fit:cover;border-radius:10px;box-shadow:inset 0 0 0 1px var(--line);margin-bottom:10px;background:var(--panel-3)}
  /* chat */
  .chat{display:grid;grid-template-rows:1fr auto;min-height:0;background:var(--panel)}
  .log{overflow-y:auto;padding:18px;display:flex;flex-direction:column;gap:13px}
  .msg{max-width:92%;font-size:14px;line-height:1.5;border-radius:12px;padding:11px 14px}
  .msg.client{align-self:flex-end;background:var(--panel-2);box-shadow:inset 0 0 0 1px var(--line)}
  .msg.bot{align-self:flex-start;background:transparent;color:var(--ink-2);padding-left:2px}
  .msg.bot .who{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-3);margin-bottom:5px;display:flex;gap:7px;align-items:center}.who .dot{width:6px;height:6px;border-radius:50%;background:var(--grad)}
  .card{border-radius:12px;background:var(--panel-2);box-shadow:inset 0 0 0 1px var(--line);overflow:hidden}.card.ok{box-shadow:inset 0 0 0 1px rgba(10,114,239,.5)}.card.bad{box-shadow:inset 0 0 0 1px rgba(255,91,79,.5)}
  .card h4{margin:0;padding:11px 14px;font-size:12px;text-transform:uppercase;letter-spacing:.07em;border-bottom:1px solid var(--line);color:var(--ink-2)}.card .body{padding:11px 14px;display:flex;flex-direction:column;gap:9px}
  .rowd .lbl{color:var(--ink-3);font-size:11px;text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px}.rowd .from{color:var(--red);text-decoration:line-through;opacity:.75;font-size:13px}.rowd .to{color:var(--green);font-size:13px}
  .err{font-size:12.5px;color:#ff9d92}
  .composer{border-top:1px solid var(--line);padding:14px 14px 16px;background:linear-gradient(180deg,var(--panel),#0c0c0e)}
  .ailabel{display:flex;align-items:center;gap:7px;font-size:11.5px;color:var(--ink-3);margin-bottom:9px}
  .ailabel .spark{width:15px;height:15px;border-radius:5px;background:var(--grad);display:inline-flex;align-items:center;justify-content:center;font-size:9px}
  .chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:9px}
  .chip{font-size:11.5px;color:var(--ink-2);background:var(--panel-2);box-shadow:inset 0 0 0 1px var(--line);border-radius:999px;padding:5px 11px;cursor:pointer;transition:.15s}.chip:hover{color:var(--ink);box-shadow:inset 0 0 0 1px var(--blue)}

function showLogin(me){

    <div class="lbrand"><svg viewBox="0 0 24 24" fill="none"><path d="M3 20 L12 4 L21 20 Z" fill="#fff"/></svg></div>
    <h2>${esc(me.clientName||'Welcome')} 👋</h2>
    <p>Enter the password to edit <b>${esc(SITE)}</b>.</p>
    <input type="password" id="loginPw" placeholder="Password" autocomplete="current-password">

    <div class="loginerr" id="loginErr"></div>
  </div>`;
  g.classList.add('show');setTimeout(()=>$('#loginPw').focus(),60);
  const go=async()=>{const pw=$('#loginPw').value.trim();if(!pw)return;$('#loginGo').disabled=true;$('#loginGo').textContent='Checking…';
    const r=await (await fetch('/api/me?site='+SITE+'&key='+encodeURIComponent(pw))).json();

    else{$('#loginErr').textContent='That password didn\'t work — try again.';$('#loginGo').disabled=false;$('#loginGo').textContent='Unlock editor';$('#loginPw').select();}};
  $('#loginGo').onclick=go;$('#loginPw').addEventListener('keydown',e=>{if(e.key==='Enter')go();});
}
async function init(){
  const me=await (await fetch('/api/me?site='+SITE+KQ())).json();
  if(me.locked){return showLogin(me);}   // site is password-protected and we don't have a valid key yet
  planner=me.plannerMode; const isOwner=me.role==='owner'; IS_OWNER=isOwner; REQUIRE_APPROVAL=!!me.requireApproval; TOTAL=!!me.totalMode&&planner!=='local';
  // Total mode IS the simple view — the website + the chat, nothing else, for
  // everyone (owner included). No modules, no inspectors, no fields: you look
  // at the page and tell the AI what to change. ?view=full is the escape hatch
  // back into the classic editor on a Total site.
  SIMPLE=TOTAL&&_qs.get('view')!=='full';
  if(TOTAL)$('#attachBtn').style.display='';   // 📎 uploads ride along with chat commands
  if(SIMPLE){document.body.classList.add('simple');
    $('#howBody').innerHTML='<div class="r"><span class="i">💬</span><span><b>Tell the AI</b> what you want changed — copy, colors, layout, new sections, anything.</span></div><div class="r"><span class="i">🔗</span><span>Click your site\'s own <b>menu links</b> on the left to move between pages.</span></div><div class="r"><span class="i">📎</span><span><b>Attach photos or files</b> with the paperclip, then say where they go — "use this as the hero photo".</span></div><div class="r"><span class="i">↶</span><span>Every change has an <b>Undo</b> — nothing is ever stuck.</span></div><div class="r"><span class="i">🚀</span><span>Happy with it? <b>Publish</b> makes it live.</span></div>';}
  if(!isOwner){const needsApproval=REQUIRE_APPROVAL;$('#publishBtn').textContent=needsApproval?'Submit for review':'Publish';$('#publishBtn').title=needsApproval?'Send your changes to the agency to approve':'Publish your changes live';$('#auditBtn').style.display='none';}
  if(isOwner){
    const meta=await (await fetch('/api/sites')).json();
    const names=meta.sites.map(s=>s.name);
    if(!names.length){bubble('bot','No sites yet.');return;}
    if(!names.includes(SITE))SITE=names[0];
    $('#siteSel').innerHTML=meta.sites.map(s=>`<option value="${s.name}" ${s.name===SITE?'selected':''}>${s.name}</option>`).join('');
    $('#siteSel').onchange=e=>{location.search='?site='+e.target.value+(KEY?'&key='+KEY:'');};
  } else {
    $('#siteSel').style.display='none';   // client: locked to their one site
    // Clients reach pages from their front-door dashboard, not the in-editor pages dropdown.
    $('#pagesBtn').style.display='none';
    const bh=$('#backHome');bh.style.display='';bh.href='/client/?site='+encodeURIComponent(SITE)+(KEY?'&key='+encodeURIComponent(KEY):'');
  }
  const mb=$('#modeBadge');
  if(planner!=='local'){mb.className='badge';mb.style.display='';mb.innerHTML=TOTAL?'✨ <b>Total AI</b> — ask for any change':`AI: <b>${planner}</b>`;}
  else if(isOwner){mb.className='badge warn';mb.style.display='';mb.textContent='⚠ Add AI key';mb.onclick=()=>window.open('/admin/?key=owner-dev','_blank');}
  else mb.style.display='none';           // client doesn't manage keys
  $('#howBtn').onclick=()=>{$('#howBtn').classList.toggle('open');$('#howBody').classList.toggle('open');};
  await loadPages();await loadVersions();await loadReview();refreshInbox();loadChips();
  if(SIMPLE)bubble('bot',`This is your website, <b style="color:#f0f0f2">${esc(SITE)}</b> — and I'm your editor. Tell me what you'd like changed: wording, colors, layout, whole new sections. I'll show you every change right here, and you can undo anything. When you're happy, hit <b>Publish</b> to make it live.`);
  else bubble('bot',`${isOwner?'Editing':'Welcome — you can edit'} <b style="color:#f0f0f2">${esc(SITE)}</b>. Click any text to change it, select something to tweak its link/spacing on the right. <b>Save</b> keeps a draft; <b>Publish</b> pushes it live.`);
  maybeTour();
}

async function loadPages(){
  const d=await (await fetch('/api/pages?site='+SITE+KQ())).json();
  pagesList=d.pages;
  hasDraft=pagesList.some(p=>p.dirty);   // server may already hold a saved-but-unpublished draft
  if(!PAGE||!pagesList.find(p=>p.slug===PAGE))PAGE=d.home;
  sessionStorage.setItem('cms_page',PAGE);
  const cur=pagesList.find(p=>p.slug===PAGE);
  $('#pglabel').textContent=cur?cur.title:PAGE;
  $('#liveLink').href='/live/'+SITE+(PAGE===d.home?'':'/'+PAGE);
  renderPages();updateBar();await loadPreview();
}
let newTpl='blank';
function renderPages(){
  const p=$('#pagesPanel');
  p.innerHTML='<h4>Pages</h4>'+pagesList.map(pg=>`<div class="pg ${pg.slug===PAGE?'cur':''}"><span class="nm" data-go="${pg.slug}">${esc(pg.title)} ${pg.home?'<span class="hm">● home</span>':''}<span class="pth">${esc(pg.path)}</span></span>${IS_OWNER?`<span class="ico" title="Refresh from live source (keeps home/access/history — only this page's fields reset)" data-refresh="${pg.slug}">⟳</span>`:''}${pg.home?'':`<span class="ico" title="Set as home" data-home="${pg.slug}">⌂</span><span class="ico" title="Delete" data-del="${pg.slug}">🗑</span>`}</div>`).join('')+
    `<div class="addbox">
       <div class="addlbl">Add a new page</div>
       <div class="tplrow">
         <button class="tpl ${newTpl==='blank'?'on':''}" data-tpl="blank"><b>Blank</b><span>Title + subheading</span></button>
         <button class="tpl ${newTpl==='article'?'on':''}" data-tpl="article"><b>Article</b><span>Blog-style post</span></button>
       </div>
       <input id="newPage" placeholder="Page title — e.g. About us">
       <button id="addPage" class="addbtn">＋ Add page</button>
     </div>`;
  p.querySelectorAll('[data-go]').forEach(e=>e.onclick=()=>switchPage(e.dataset.go));
  p.querySelectorAll('[data-home]').forEach(e=>e.onclick=()=>pageOp('/api/pages/home',{slug:e.dataset.home}));
  p.querySelectorAll('[data-del]').forEach(e=>e.onclick=()=>{if(confirm('Delete this page?'))pageOp('/api/pages/delete',{slug:e.dataset.del});});
  p.querySelectorAll('[data-refresh]').forEach(e=>e.onclick=()=>{if(confirm('Re-fetch this page from its live source? New sections/images picked up on the live site will become editable. Any unpublished draft for this page will be discarded — its home/access/history are untouched.')){delete chatHistory[e.dataset.refresh];pageOp('/api/pages/refresh',{slug:e.dataset.refresh});}});
  p.querySelectorAll('[data-tpl]').forEach(e=>e.onclick=()=>{newTpl=e.dataset.tpl;p.querySelectorAll('[data-tpl]').forEach(x=>x.classList.toggle('on',x===e));});
  const add=()=>{const t=$('#newPage').value.trim();if(t)pageOp('/api/pages/add',{title:t,template:newTpl});};
  $('#addPage').onclick=add;
  $('#newPage').addEventListener('keydown',e=>{if(e.key==='Enter')add();});
}
async function pageOp(url,body){
  const r=await (await fetch(url+'?site='+SITE+KQ(),{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)})).json();
  if(r.error){bubble('bot','⛔ '+r.error);return;}
  if(r.slug)PAGE=r.slug;
  await loadPages();await loadVersions();bubble('bot','✓ Pages updated — published live.');
}
function switchPage(slug){if(!pagesList.find(p=>p.slug===slug))return;PAGE=slug;sel=null;$('#pagesPanel').classList.remove('show');loadPages();if($('#seoPanel').classList.contains('show'))loadSeo();if($('#inspPanel').classList.contains('show'))renderInspector();}
// Resolve a clicked link (any form: /live/site/slug, vendor-eset.html, /s/site?page=slug, etc.)
// to the page it points at and edit THAT page. Only the site root/home link goes home; an
// unrecognized link stays put rather than bouncing back to the summary page.
function navToHref(href){
  if(!href)return;
  const clean=String(href).split('#')[0];
  const home=(pagesList.find(p=>p.home)||{}).slug;
  const bn=s=>((s||'').replace(/\/+$/,'').split('/').pop()||'').replace(/\.html?$/i,'');
  const find=slug=>pagesList.find(p=>p.slug===slug)||pagesList.find(p=>bn(p.path)===slug);
  // /live/<site>[/<slug>] : the site root (no slug) is home
  const ml=clean.match(/\/live\/[^/?#]+\/?([^/?#]*)/);
  if(ml){const s=ml[1];if(!s){if(home)switchPage(home);return;}const h=find(s);switchPage(h?h.slug:home);return;}
  // /s/<site>?page=<slug>  (or ?page= on any path)
  const qp=clean.match(/[?&]page=([^&]+)/);
  if(qp){const h=find(decodeURIComponent(qp[1]));if(h)switchPage(h.slug);return;}
  // /s/<site> with no page -> home
  if(/\/s\/[^/?#]+\/?$/.test(clean)){if(home)switchPage(home);return;}
  // relative link like vendor-eset.html
  const base=bn(clean.split('?')[0]);
  if(!base||base.toLowerCase()==='index'){if(home)switchPage(home);return;}
  const hit=find(base);
  if(hit)switchPage(hit.slug); // unknown link: stay put, never bounce to summary
}

let flashIds=[];
function loadPreview(){
  return fetch('/api/render?edit='+(SIMPLE?'nav':'1')+'&site='+SITE+PQ()+KQ(),{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({content:pending()})}).then(r=>r.text()).then(html=>{frame.style.opacity='0';frame.onload=()=>{frame.style.opacity='1';if(flashIds.length){const f=flashIds;flashIds=[];setTimeout(()=>toFrame({type:'flash',ids:f}),140);}};frame.srcdoc=html;});
}
function updateBar(){
  const n=Object.values(pendingByPage).reduce((a,m)=>a+Object.keys(m).length,0);
  const unsaved=n>0;                       // edits in the browser not yet sent to the server
  const liveDirty=unsaved||hasDraft;       // anything not yet on the live site
  const sb=$('#saveBtn'),pb=$('#publishBtn');
  sb.disabled=!unsaved;
  sb.classList.toggle('attn',unsaved);
  sb.textContent=unsaved?(n>1?`Save ${n} edits`:'Save'):'Saved';
  if(!IS_OWNER&&REQUIRE_APPROVAL){          // approval-gated client: Publish becomes the review submit
    pb.textContent=reviewPending?'Awaiting approval':'Submit for review';
    pb.disabled=reviewPending||!liveDirty;
  }else{
    pb.textContent='Publish';pb.disabled=!liveDirty;
  }
  $('#discardBtn').disabled=!liveDirty;   // in the ⋯ menu — dimmed when nothing to discard
  saveStat();
}
/* ── approval gate ── */
async function submitReview(){
  if(!Object.values(pendingByPage).some(m=>Object.keys(m).length)&&!hasDraft)return;
  $('#publishBtn').disabled=true;$('#saveStat').textContent='Submitting…';
  const r=await (await fetch('/api/submit-review?site='+SITE+KQ(),{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({pages:pendingByPage})})).json();
  if(r.ok){pendingByPage={};hasDraft=true;reviewPending=true;updateBar();await loadPreview();toast('📤 Sent to the agency for approval — you\'ll be live once they sign off.',5000);}
  else{updateBar();bubble('bot','⛔ '+(r.error||'Could not submit.'));}
}
async function loadReview(){
  const r=await (await fetch('/api/review?site='+SITE+KQ())).json();
  reviewPending=!!r.pending;
  const bar=$('#reviewBar');
  if(IS_OWNER&&reviewPending){
    const when=r.at?new Date(r.at).toLocaleString():'';
    bar.innerHTML=`<span>👀 <b>A client submitted changes</b> for your review${r.note?` — “${esc(r.note)}”`:''}. <span style="opacity:.7">${esc(when)}</span></span><button class="ap" id="apRev">✓ Approve &amp; publish</button><button class="rj" id="rjRev">Reject</button>`;
    bar.classList.add('show');
    $('#apRev').onclick=approveReview;$('#rjRev').onclick=rejectReview;
  }else{bar.classList.remove('show');}
  updateBar();
}
async function approveReview(){
  $('#apRev').disabled=true;$('#apRev').textContent='Publishing…';
  const r=await (await fetch('/api/review/approve?site='+SITE+KQ(),{method:'POST'})).json();
  if(r.ok){reviewPending=false;hasDraft=false;$('#reviewBar').classList.remove('show');updateBar();await loadPreview();await loadVersions();
    toast('✓ Approved &amp; published live.');}
  else{bubble('bot','⛔ '+(r.error||'Could not approve.'));await loadReview();}
}
async function rejectReview(){
  const discard=confirm('Reject these changes?\n\nOK = reject AND discard the draft.\nCancel = keep the draft so the client can revise.');
  await fetch('/api/review/reject?site='+SITE+KQ(),{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({discard})});
  reviewPending=false;$('#reviewBar').classList.remove('show');
  if(discard){pendingByPage={};hasDraft=false;await loadPreview();}
  updateBar();toast('Review rejected.');
}
/* ── activity log ── */
async function loadAudit(){
  const r=await (await fetch('/api/audit?site='+SITE+KQ())).json();
  const ICON={publish:'🚀',save:'💾',submit:'📤',approve:'✅',reject:'🚫',restore:'⏱',handoff:'🔑'};
  const p=$('#auditPanel');
  const rows=(r.entries||[]).map(e=>{const who=e.role==='client'?'Client':'You';const when=e.at?new Date(e.at).toLocaleString():'';
    let txt={publish:`${who} published`,save:`${who} saved a draft`,submit:'Client submitted for review',approve:'You approved & published',reject:'You rejected a review',restore:`${who} restored v${e.version}`,handoff:'Client link issued'}[e.action]||`${who} ${e.action}`;
    if(e.summary)txt+=` — ${esc(e.summary)}`;if(e.note)txt+=` — “${esc(e.note)}”`;
    return `<div class="aitem"><span class="ic">${ICON[e.action]||'•'}</span><span class="w">${esc(txt)}<span class="t">${esc(when)}</span></span></div>`;}).join('');
  p.innerHTML='<h4>Activity log</h4>'+(rows?`<div class="alog">${rows}</div>`:'<div class="selnote">No activity yet.</div>');
}
/* ── form submissions inbox ── */
async function refreshInbox(){
  try{const r=await (await fetch('/api/forms?site='+SITE+KQ())).json();const subs=r.submissions||[];unreadForms=subs.filter(x=>!x.read).length;
    const b=$('#inboxBadge');b.textContent=unreadForms;b.classList.toggle('show',unreadForms>0);}catch(e){}
}
async function loadForms(){
  const r=await (await fetch('/api/forms?site='+SITE+KQ())).json();const subs=r.submissions||[];
  const p=$('#formsPanel');
  const cards=subs.map(sxn=>{const when=sxn.at?new Date(sxn.at).toLocaleString():'';
    const flds=Object.entries(sxn.fields||{}).map(([k,v])=>`<div class="fld"><span>${esc(k)}:</span> ${esc(v)}</div>`).join('');
    return `<div class="subm ${sxn.read?'':'unread'}"><div class="row"><span>${esc(when)}${sxn.page?' · '+esc(sxn.page):''}</span><span class="del" data-del="${sxn.id}">🗑</span></div>${flds}</div>`;}).join('');
  p.innerHTML='<h4>Form submissions</h4>'+(cards?cards:'<div class="selnote">No submissions yet. When someone fills in a form on the live site, it lands here.</div>');
  p.querySelectorAll('[data-del]').forEach(e=>e.onclick=async()=>{await fetch('/api/forms/delete?site='+SITE+KQ(),{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id:e.dataset.del})});loadForms();refreshInbox();});
  if(unreadForms){await fetch('/api/forms/read?site='+SITE+KQ(),{method:'POST'});refreshInbox();}
}
function toFrame(msg){frame.contentWindow&&frame.contentWindow.postMessage(msg,'*');}

window.addEventListener('message',async e=>{
  const d=e.data;if(!d)return;
  if(d.type==='cms-edit'){pending()[d.id]=d.value;updateBar();}
  else if(d.type==='cms-select'){sel={id:d.id,tag:d.tag,text:d.text,href:d.href,img:d.img,embed:d.embed};showScope();openInspectorOnSelect();}
  else if(d.type==='cms-deselect'){sel=null;showScope();if($('#inspPanel').classList.contains('show'))renderInspector();}
  else if(d.type==='cms-section'){sel=null;showScope();showPanel('#inspPanel');renderSectionCard(d.label||'Section');}
  else if(d.type==='cms-open'){sel=sel&&sel.id===d.id?sel:{id:d.id,tag:'',text:'',href:d.panel==='link'?'':null,img:d.panel==='image',embed:d.panel==='embed'};showPanel('#inspPanel');renderInspector();setTimeout(()=>{const t=$(d.panel==='link'?'#insLink':'#inspPanel .dialgrp');if(t){t.scrollIntoView({block:'nearest'});if(t.focus)t.focus();}},60);}
  else if(d.type==='cms-ai'){input.value=`Change the ${(d.kind||'text').toLowerCase()} “${(d.text||'').slice(0,40)}” to `;input.focus();input.dispatchEvent(new Event('input'));toast('✨ Finish your request and hit enter');}
  else if(d.type==='cms-nav'){navToHref(d.href);}
  else if(d.type==='cms-add-block'){openBlockPicker(d.section,d.label);}
  else if(d.type==='cms-structure'){
    const r=await (await fetch('/api/structure?site='+SITE+PQ()+KQ(),{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({op:d.op,col:d.col,index:d.index})})).json();
    if(r.ok){hasDraft=true;updateBar();await loadPreview();toast('✏️ '+r.message);}else bubble('bot','⛔ '+(r.error||'Could not change layout.'));
  }
});

// Save = stage edits as a draft on the server (survives reload) — does NOT go live.
async function save(){
  const n=Object.values(pendingByPage).reduce((a,m)=>a+Object.keys(m).length,0);
  if(!n)return;
  $('#saveBtn').disabled=true;$('#saveStat').textContent='Saving…';
  const r=await (await fetch('/api/save?site='+SITE+KQ(),{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({pages:pendingByPage})})).json();
  if(r.ok){pendingByPage={};hasDraft=true;updateBar();toast('💾 Draft saved — not live yet');}
  else{updateBar();const c=document.createElement('div');c.className='card bad';c.innerHTML=`<h4>⛔ Blocked by safety check</h4><div class="body">${(r.errors||[r.error]).map(x=>`<div class="err">${esc(x)}</div>`).join('')}</div>`;log.appendChild(c);}
}
// Publish = push the current state (saved draft + any unsaved edits) live + deploy.
async function publish(){
  if(!IS_OWNER&&REQUIRE_APPROVAL)return submitReview();   // approval-gated clients submit for the agency to approve
  if(!Object.values(pendingByPage).some(m=>Object.keys(m).length)&&!hasDraft)return;
  $('#publishBtn').disabled=true;$('#saveStat').textContent='Publishing…';
  const r=await (await fetch('/api/publish?site='+SITE+KQ(),{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({pages:pendingByPage})})).json();
  if(r.ok){pendingByPage={};hasDraft=false;updateBar();await loadPreview();await loadVersions();
    toast(`✓ Your site is live — <a href="/live/${SITE}" target="_blank">view it ↗</a>`);}
  else{updateBar();const c=document.createElement('div');c.className='card bad';c.innerHTML=`<h4>⛔ Blocked by safety check</h4><div class="body">${(r.errors||[r.error]).map(x=>`<div class="err">${esc(x)}</div>`).join('')}</div>`;log.appendChild(c);}
}
async function discard(){pendingByPage={};hasDraft=false;sel=null;showScope();await fetch('/api/discard?site='+SITE+KQ(),{method:'POST'});updateBar();await loadPreview();toast('Changes discarded');}

document.addEventListener('keydown',e=>{
  const mod=e.metaKey||e.ctrlKey;
  if(mod&&!e.shiftKey&&e.key==='s'){e.preventDefault();save();return;}
  if(mod&&e.shiftKey&&(e.key==='p'||e.key==='P')){e.preventDefault();publish();return;}
  if(e.key==='Escape'){
    if($('#seoPanel').classList.contains('show')){closeSeo();return;}
    const anyDock=DOCK.some(id=>$(id).classList.contains('show'));
    if(anyDock){closeDock();return;}
    const anyPanel=PANELS.some(id=>$(id).classList.contains('show'));
    if(anyPanel){PANELS.forEach(x=>$(x).classList.remove('show'));syncDock();return;}
  }
});

function seoField(f){
  if(!f)return '';

  if(f.image)return `<div class="f"><label>${esc(f.label)}</label><div class="imgrow">${v?`<img class="thumb" src="${esc(absUrl(v))}">`:'<span class="thumb ph">🖼</span>'}<input data-seo="${f.key}" value="${esc(v)}" placeholder="Paste URL…"><button class="ghost" data-seoup="${f.key}" style="flex:0 0 auto;padding:9px 11px">⤒</button></div><div class="hint">${esc(f.hint)}</div></div>`;

// Yoast-style content analysis (deterministic, runs on the live page + SEO fields)
function seoAnalysis(){
  const kw=(seoVal('focuskw')||'').trim().toLowerCase();
  const title=(seoVal('title')||curPageTitle()||'').trim();
  const desc=(seoVal('description')||'').trim();
  const path=((pagesList.find(p=>p.slug===PAGE)||{}).path||('/'+PAGE)).toLowerCase();
  let bodyText='',headings=[],imgs=[],links=0;
  try{const d=frame.contentDocument;bodyText=(d.body.innerText||'').replace(/\s+/g,' ').trim();
    headings=[...d.querySelectorAll('h1,h2,h3,h4')].map(h=>(h.innerText||'').toLowerCase());
    imgs=[...d.querySelectorAll('img')];links=d.querySelectorAll('a[href]').length;}catch(e){}
  const words=bodyText?bodyText.split(' ').filter(Boolean):[];const wc=words.length;
  const checks=[];const push=(level,text)=>checks.push({level,text});
  if(!title)push('problem','Add an SEO title.');
  else if(title.length>60)push('problem',`SEO title is too long (${title.length} chars) — keep it under 60.`);
  else if(title.length<20)push('improve','SEO title is short — aim for 20–60 characters.');
  else push('good','SEO title has a good length.');
  if(!desc)push('problem','Add a meta description.');
  else if(desc.length>160)push('improve',`Meta description is a touch long (${desc.length}) — keep it near 155.`);
  else if(desc.length<120)push('improve',`Meta description is short (${desc.length}) — aim for 120–156.`);
  else push('good','Meta description has a good length.');
  if(wc>=300)push('good',`Text length: ${wc} words — good.`);
  else if(wc>=200)push('improve',`Text is ${wc} words — aim for 300+ for stronger ranking.`);
  else push('problem',`Text is only ${wc} words — add more content (300+).`);
  if(imgs.length){const noalt=imgs.filter(i=>!(i.getAttribute('alt')||'').trim()).length;
    if(noalt===0)push('good','Every image has alt text.');
    else push('improve',`${noalt} of ${imgs.length} images are missing alt text.`);}
  push(links>=1?'good':'improve',links>=1?`The page contains ${links} link${links>1?'s':''}.`:'Add at least one link (internal or outbound).');
  if(!kw){push('improve','Set a focus keyphrase above to unlock keyphrase checks.');}
  else{
    const tl=title.toLowerCase(),dl=desc.toLowerCase(),sl=path.replace(/[^a-z0-9]+/g,' ');
    push(tl.includes(kw)?'good':'problem',tl.includes(kw)?'Focus keyphrase is in the SEO title.':'Focus keyphrase is not in the SEO title.');
    push(dl.includes(kw)?'good':'improve',dl.includes(kw)?'Focus keyphrase is in the meta description.':'Focus keyphrase is not in the meta description.');
    push(sl.includes(kw)?'good':'improve',sl.includes(kw)?'Focus keyphrase is in the URL slug.':'Focus keyphrase is not in the URL slug.');
    push(headings.some(h=>h.includes(kw))?'good':'improve',headings.some(h=>h.includes(kw))?'Focus keyphrase appears in a subheading.':'Use the focus keyphrase in at least one subheading.');
    const intro=words.slice(0,100).join(' ').toLowerCase();
    push(intro.includes(kw)?'good':'improve',intro.includes(kw)?'Focus keyphrase appears early in the content.':'Use the focus keyphrase in the first paragraph.');
    if(wc){const re=new RegExp(kw.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'g');const occ=(bodyText.toLowerCase().match(re)||[]).length;const dens=occ/wc*100;
      if(dens>=0.5&&dens<=2.5)push('good',`Keyphrase density is ${dens.toFixed(1)}% — in the sweet spot.`);
      else if(dens<0.5)push('improve',`Keyphrase density is low (${dens.toFixed(1)}%) — use it a little more.`);
      else push('problem',`Keyphrase density is high (${dens.toFixed(1)}%) — it reads as keyword-stuffing.`);}
  }
  const good=checks.filter(c=>c.level==='good').length,prob=checks.filter(c=>c.level==='problem').length;
  let score,label;
  if(!kw){score='none';label='Set a keyphrase';}
  else if(prob===0&&good/checks.length>=0.7){score='good';label='Good';}
  else if(prob>=2){score='problem';label='Needs work';}
  else{score='improve';label='OK — could be better';}
  return {checks,score,label,good,total:checks.length};
}
function scoreHTML(a){return `<div class="score"><div class="light ${a.score}"></div><div><div class="lbl">SEO score: ${esc(a.label)}</div><div class="sub">${a.good}/${a.total} checks passing</div></div></div>`;}
function checksHTML(a){
  const ord={problem:0,improve:1,good:2},labels={problem:'Problems',improve:'Improvements',good:'Good results'};
  const sorted=a.checks.slice().sort((x,y)=>ord[x.level]-ord[y.level]);
  let h='',last=null;
  sorted.forEach(c=>{if(c.level!==last){h+=`<div class="cgrp">${labels[c.level]}</div>`;last=c.level;}h+=`<div class="check"><span class="dot ${c.level}"></span><span>${esc(c.text)}</span></div>`;});
  return `<div class="checks">${h}</div>`;
}
function renderSeo(){

/* ── contextual AI chips ── */
async function loadChips(){
  try{
    const st=await (await fetch('/api/state?site='+SITE+PQ()+KQ())).json();
    cacheSchema(st);if(!styleSpec){seoState=st.seo;seoFields=st.seoFields;styleSpec=st.styleSpec;}
    const groups=st.groups||{};
    const chips=[];
    // headline chip — first heading found
    for(const[g,fields] of Object.entries(groups)){const h=fields.find(f=>/^Heading:/i.test(f.label));if(h){chips.push('Rewrite the '+g+' heading to be more compelling');break;}}
    // CTA chip — first button/link
    for(const[g,fields] of Object.entries(groups)){const b=fields.find(f=>/^Button:|^Link:/i.test(f.label));if(b&&b.value){chips.push('Make the "'+b.value.slice(0,22)+'" button more urgent');break;}}
    // body copy chip — first long paragraph
    for(const[g,fields] of Object.entries(groups)){const p=fields.find(f=>/^Text:/i.test(f.label)&&(f.value||'').length>60);if(p){chips.push('Shorten the '+g+' description');break;}}
    chips.push('Rewrite in a more professional tone');
    const row=$('#chipsRow');
    if(row){row.innerHTML=chips.slice(0,4).map(t=>`<span class="chip">${esc(t)}</span>`).join('');
      row.querySelectorAll('.chip').forEach(ch=>ch.onclick=()=>{input.value=ch.textContent;input.focus();input.dispatchEvent(new Event('input'));});}
  }catch(e){}
}

  const il=$('#insLink');if(il)il.oninput=()=>{pending()['link:'+sel.id]=il.value;updateBar();};
  const iu=$('#insUpload');if(iu)iu.onclick=()=>{imgTarget=sel.id;$('#imgFile').click();};
  const ix=$('#insImgUrl');if(ix)ix.oninput=()=>setImage(sel.id,ix.value);
  const ie=$('#insEmbedUrl');if(ie)ie.oninput=()=>setEmbed(sel.id,ie.value);
  p.querySelectorAll('[data-st]').forEach(r=>r.oninput=()=>{const prop=r.dataset.st,sp=styleSpec[prop];const pct=Math.round((r.value-sp.min)/(sp.max-sp.min)*100);r.style.setProperty('--fill',pct+'%');pending()['style:'+sel.id+':'+prop]=r.value;toFrame({type:'apply-style',id:sel.id,css:sp.css,value:r.value+(sp.unit||'')});p.querySelector(`[data-rv="${prop}"]`).textContent=r.value+(sp.unit||'');updateBar();});
  p.querySelectorAll('[data-stc]').forEach(r=>r.oninput=()=>{const prop=r.dataset.stc,sp=styleSpec[prop];pending()['style:'+sel.id+':'+prop]=r.value;toFrame({type:'apply-style',id:sel.id,css:sp.css,value:r.value});const rv=p.querySelector(`[data-rv="${prop}"]`);if(rv)rv.textContent=r.value;updateBar();});
  p.querySelectorAll('[data-al]').forEach(b=>b.onclick=()=>{pending()['style:'+sel.id+':textAlign']=b.dataset.al;toFrame({type:'apply-style',id:sel.id,css:'text-align',value:b.dataset.al});p.querySelectorAll('[data-al]').forEach(x=>x.classList.toggle('on',x===b));updateBar();});
  $('#insSave').onclick=save;
}
function renderSectionCard(label){
  $('#inspPanel').innerHTML=`<h4>Section</h4>
    <div class="seccard"><div class="secname">◳ ${esc(label)}</div>
    <p>This whole block is highlighted on the left. Click any <b>text, button or image</b> inside it to fine-tune its content, link, spacing &amp; size here — your chat stays open on the right.</p></div>`;
}
/* ── image upload ── */
let imgTarget=null, seoTarget=null;
function curImgSrc(id){try{return frame.contentDocument.querySelector('[data-cms-img="'+id+'"]').getAttribute('src')||'';}catch(e){return '';}}
function setImage(id,url){pending()[id]=url;toFrame({type:'set-img',id,value:url});updateBar();}
function curEmbedSrc(id){try{return frame.contentDocument.querySelector('[data-cms-embed="'+id+'"]').getAttribute('src')||'';}catch(e){return '';}}
function setEmbed(id,url){pending()[id]=url;toFrame({type:'set-embed',id,value:url});updateBar();}
async function uploadImage(file){
  if(!file)return null;
  const dataUrl=await new Promise(res=>{const r=new FileReader();r.onload=()=>res(r.result);r.readAsDataURL(file);});
  const j=await (await fetch('/api/upload?site='+SITE+KQ(),{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({dataUrl})})).json();
  if(j.error){toast('⛔ '+j.error);return null;} return j.url;
}
$('#imgFile').onchange=async(e)=>{const f=e.target.files[0];e.target.value='';if(!f||!imgTarget)return;toast('Uploading…',1600);const url=await uploadImage(f);if(url){setImage(imgTarget,url);if($('#inspPanel').classList.contains('show'))renderInspector();toast('✓ Image updated');}};
$('#imgFileSeo').onchange=async(e)=>{const f=e.target.files[0];e.target.value='';if(!f||!seoTarget)return;toast('Uploading…',1600);const url=await uploadImage(f);if(url){pending()['seo:'+seoTarget]=url;updateBar();renderSeo();toast('✓ Uploaded');}};

/* ── versions ── */
let versions=[],head=-1;
async function loadVersions(){
  const r=await (await fetch('/api/versions?site='+SITE+KQ())).json();
  versions=r.versions||[];head=r.head;const idx=versions.findIndex(v=>v.seq===head);
  $('#vlabel').textContent='v'+head;$('#undoBtn').style.opacity=idx>0?'1':'.4';$('#redoBtn').style.opacity=idx<versions.length-1?'1':'.4';
  $('#histPanel').innerHTML='<h4>Version history</h4>'+versions.slice().reverse().map(v=>{const cur=v.seq===head;const t=new Date(v.ts).toLocaleString(undefined,{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});return `<div class="pg ${cur?'cur':''}" data-seq="${v.seq}"><span class="nm">v${v.seq} — ${esc(v.summary)}<span class="pth">${t}</span></span>${cur?'<span class="hm">● live</span>':''}</div>`;}).join('');
  $('#histPanel').querySelectorAll('[data-seq]').forEach(el=>el.onclick=()=>restore(+el.dataset.seq));
}
async function restore(seq){const r=await (await fetch('/api/version/restore?site='+SITE+KQ(),{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({seq})})).json();if(r.ok){pendingByPage={};hasDraft=false;sel=null;chatHistory={};updateBar();$('#histPanel').classList.remove('show');await loadPages();await loadVersions();bubble('bot',`⏱ Restored v${seq}.`);}}
function step(d){const idx=versions.findIndex(v=>v.seq===head);const t=idx+d;if(t>=0&&t<versions.length)restore(versions[t].seq);}
$('#undoBtn').onclick=()=>step(-1);$('#redoBtn').onclick=()=>step(1);

/* ── chat ── */
// Rolling chat memory per page, so "make it bigger" resolves against the prior turn.
// Keyed by page slug since each page has its own field catalogue. Capped client-side;
// the server caps again to the last 8 turns regardless of what's sent.
let chatHistory={};
function pageHistory(){return chatHistory[PAGE]||(chatHistory[PAGE]=[]);}
function showResult(r){
  bubble('bot',esc(r.summary||'Done.'));
  if(r.errors&&r.errors.length){const c=document.createElement('div');c.className='card bad';c.innerHTML=`<h4>⛔ Blocked</h4><div class="body">${r.errors.map(e=>`<div class="err">${esc(e)}</div>`).join('')}</div>`;log.appendChild(c);return;}
  if(!r.diff||!r.diff.length){bubble('bot',"No confident change — try clicking the text, or add an AI key.");return;}
  r.diff.forEach(d=>pending()[d.id]=r.candidate[d.id]);flashIds=r.diff.map(d=>d.id).filter(id=>!id.includes(':'));loadPreview();updateBar();
  const c=document.createElement('div');c.className='card ok';c.innerHTML=`<h4>📝 staged ${r.diff.length} change${r.diff.length>1?'s':''}</h4><div class="body">${r.diff.map(d=>`<div class="rowd"><div class="lbl">${esc(d.label)}</div><div class="from">${esc(strip(d.from)||'(empty)')}</div><div class="to">${esc(strip(d.to))}</div></div>`).join('')}</div>`;log.appendChild(c);log.scrollTop=log.scrollHeight;
}
/* ── chat attachments (Total mode): upload → the file's URL rides along with
   the next command, and the AI places it (img src, PDF link, video). ── */
let chatAttach=[];   // [{name,url,kind}]
function renderAttach(){
  const row=$('#attachRow');
  row.style.display=chatAttach.length?'flex':'none';
  row.innerHTML=chatAttach.map((a,i)=>`<button class="chip" data-rm="${i}" title="Remove">${a.kind==='image'?'🖼':a.kind==='video'?'🎬':a.kind==='audio'?'🎧':'📄'} ${esc(a.name)} ✕</button>`).join('');
  row.querySelectorAll('[data-rm]').forEach(b=>b.onclick=()=>{chatAttach.splice(+b.dataset.rm,1);renderAttach();});
}
async function uploadChatFile(file){
  if(file.size>12*1024*1024){toast('⛔ '+esc(file.name)+' is over 12MB');return;}
  const dataUrl=await new Promise(res=>{const r=new FileReader();r.onload=()=>res(r.result);r.readAsDataURL(file);});
  const j=await (await fetch('/api/upload?site='+SITE+KQ(),{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({dataUrl})})).json();
  if(j.error){toast('⛔ '+esc(j.error));return;}
  const kind=/^image\//.test(file.type)?'image':/^video\//.test(file.type)?'video':/^audio\//.test(file.type)?'audio':'file';
  chatAttach.push({name:file.name,url:j.url,kind});renderAttach();
}
$('#attachBtn').onclick=(e)=>{e.preventDefault();$('#chatFiles').click();};
/* ── dictation: Web Speech API (built into Chrome/Edge/Safari) — button only
   appears when the browser supports it. Click to talk, click again to stop;
   words land in the input so you can review before sending. ── */
(function(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  const mb=$('#micBtn');
  if(!SR)return;                                  // unsupported browser: stay hidden
  mb.style.display='';
  let rec=null,listening=false,baseText='';
  function stopRec(){if(rec){try{rec.stop();}catch(e){}}listening=false;mb.style.opacity='.75';mb.style.color='inherit';mb.title='Speak instead of typing';}
  mb.onclick=(e)=>{e.preventDefault();
    if(listening)return stopRec();
    rec=new SR();rec.lang=navigator.language||'en-US';rec.continuous=true;rec.interimResults=true;
    baseText=input.value?input.value.replace(/\s+$/,'')+' ':'';
    rec.onresult=(ev)=>{let fin='',inter='';
      for(let i=0;i<ev.results.length;i++){const r=ev.results[i];if(r.isFinal)fin+=r[0].transcript;else inter+=r[0].transcript;}
      input.value=baseText+fin+inter;input.style.height='auto';input.style.height=input.scrollHeight+'px';};
    rec.onerror=(ev)=>{stopRec();if(ev.error==='not-allowed')toast('⛔ Microphone blocked — allow mic access for this site in your browser.');};
    rec.onend=()=>{if(listening)stopRec();};
    try{rec.start();listening=true;mb.style.opacity='1';mb.style.color='#ff5b4f';mb.title='Stop listening';toast('🎙 Listening — click the mic again to stop');}
    catch(e){stopRec();}
  };
})();
$('#chatFiles').onchange=async(e)=>{const fs=[...e.target.files];e.target.value='';if(!fs.length)return;toast('Uploading…',1500);for(const f of fs)await uploadChatFile(f);};
function attachNote(){
  if(!chatAttach.length)return '';
  return '\n\n(The user attached '+chatAttach.map(a=>`${a.name} — ${a.kind} at ${a.url}`).join('; ')+'. Use these exact URLs where relevant.)';
}

/* Total mode: the command is applied to the draft server-side; the preview
   reloads to show it immediately, with a one-click Undo on every change. */
function showTotalResult(r){
  bubble('bot',esc(r.summary||'Done.'));
  if(!r.ok){if(r.errors&&r.errors.length){const c=document.createElement('div');c.className='card bad';c.innerHTML=`<h4>⛔ Blocked by safety check</h4><div class="body">${r.errors.map(e=>`<div class="err">${esc(e)}</div>`).join('')}</div>`;log.appendChild(c);log.scrollTop=log.scrollHeight;}return;}
  const c=document.createElement('div');c.className='card ok';
  c.innerHTML=`<h4>✨ Applied to your draft</h4><div class="body">${(r.did||[]).map(d=>`<div class="rowd"><div class="lbl">${esc(d)}</div></div>`).join('')}<button class="ghost" style="margin-top:8px;padding:6px 12px">↶ Undo this</button></div>`;
  c.querySelector('button').onclick=async(e)=>{e.target.disabled=true;
    const u=await (await fetch('/api/total/undo?site='+SITE+PQ()+KQ(),{method:'POST'})).json();
    if(u.ok){c.style.opacity='.45';bubble('bot','↶ Undone.');hasDraft=u.undoDepth>0||hasDraft;await loadPreview();updateBar();}
    else{e.target.disabled=false;toast('⛔ '+(u.error||'Could not undo.'));}};
  log.appendChild(c);log.scrollTop=log.scrollHeight;
}
async function send(){const command=input.value.trim();if(!command&&!chatAttach.length)return;input.value='';input.style.height='auto';
  bubble('client',esc(command||'(attached files)')+(chatAttach.length?'<div style="opacity:.7;font-size:12px;margin-top:4px">📎 '+chatAttach.map(a=>esc(a.name)).join(', ')+'</div>':''));
  const scoped=((sel&&sel.id&&sel.text)?`${command} — (the ${(sel.tag||'text').toLowerCase()} that currently says "${sel.text.slice(0,60)}")`:command)+attachNote();
  chatAttach=[];renderAttach();
  const hist=pageHistory();
  const t=bubble('bot','<span class="spin"></span> '+(TOTAL?'Designing &amp; checking…':'Planning &amp; checking…'));
  try{
    if(TOTAL){
      const r=await (await fetch('/api/total?site='+SITE+PQ()+KQ(),{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({command:scoped,history:hist})})).json();
      t.remove();
      if(r.error){bubble('bot','⛔ '+esc(r.error));return;}
      showTotalResult(r);
      if(r.ok){hasDraft=true;sel=null;showScope();await loadPreview();updateBar();}
      hist.push({role:'user',content:scoped},{role:'assistant',content:r.summary||'Done.'});
      chatHistory[PAGE]=hist.slice(-12);
      return;
    }
    const r=await (await fetch('/api/plan?site='+SITE+PQ()+KQ(),{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({command:scoped,history:hist})})).json();t.remove();showResult(r);
    hist.push({role:'user',content:scoped},{role:'assistant',content:r.summary||'Done.'});
    chatHistory[PAGE]=hist.slice(-12);
  }catch(e){t.remove();bubble('bot','Error: '+esc(e.message));}}
$('#send').onclick=send;input.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}});
input.addEventListener('input',()=>{input.style.height='auto';input.style.height=input.scrollHeight+'px';});

/* ── panels ── */
const PANELS=['#pagesPanel','#secPanel','#inspPanel','#seoPanel','#histPanel','#auditPanel','#formsPanel'];
const DOCK=['#secPanel','#inspPanel','#histPanel','#auditPanel','#formsPanel'];
function syncDock(){const open=DOCK.some(id=>$(id).classList.contains('show'));document.documentElement.style.setProperty('--dockw',open?'360px':'0px');$('#dock').classList.toggle('open',open);}
function showPanel(id){PANELS.forEach(x=>$(x).classList.toggle('show',x===id));document.querySelectorAll('.barbtn').forEach(b=>b.classList.remove('on'));syncDock();}
function toggle(id){const open=$(id).classList.contains('show');PANELS.forEach(x=>$(x).classList.remove('show'));document.querySelectorAll('.barbtn').forEach(b=>b.classList.remove('on'));if(!open)$(id).classList.add('show');syncDock();}
function closeDock(){DOCK.forEach(id=>$(id).classList.remove('show'));document.querySelectorAll('.barbtn').forEach(b=>b.classList.remove('on'));syncDock();}
async function loadSections(){
  const st=await (await fetch('/api/state?site='+SITE+PQ()+KQ())).json();
  const secs=st.sections||[];
  $('#secPanel').innerHTML='<h4>Sections on this page</h4>'+(secs.length?secs.map(s=>`<div class="pg" data-sec="${esc(s.sel)}"><span class="nm">${esc(s.label)}<span class="pth">${esc(s.sel)}</span></span><span class="ico">→</span></div>`).join(''):'<div class="selnote">No sections detected on this page.</div>')+'<div class="hint" style="margin-top:8px">Click a section to jump to it in the preview.</div>';
  $('#secPanel').querySelectorAll('[data-sec]').forEach(el=>el.onclick=()=>{toFrame({type:'scroll-to',sel:el.dataset.sec});showPanel('#inspPanel');toFrame({type:'select-in',sel:el.dataset.sec});});
}
$('#secBtn').onclick=()=>{const o=!$('#secPanel').classList.contains('show');toggle('#secPanel');if(o){$('#secBtn').classList.add('on');loadSections();}};
$('#dockClose').onclick=closeDock;
/* ── toasts ── */
function toast(html,ms=3200){const t=document.createElement('div');t.className='toast';t.innerHTML=html;$('#toasts').appendChild(t);setTimeout(()=>{t.style.transition='opacity .3s,transform .3s';t.style.opacity='0';t.style.transform='translateY(8px)';setTimeout(()=>t.remove(),300);},ms);}
function saveStat(){const n=Object.values(pendingByPage).reduce((a,m)=>a+Object.keys(m).length,0);
  let txt,col;
  if(n){txt='● Unsaved';col='#ffd9a8';}
  else if(hasDraft){txt='● Saved · not live';col='#9bc1ff';}
  else{txt='✓ Published';col='var(--ink-3)';}
  $('#saveStat').innerHTML=txt;$('#saveStat').style.color=col;}
/* ── device preview ── */
const DEV={desktop:'100%',tablet:'820px',mobile:'390px'};
$('#deviceSeg').querySelectorAll('[data-dev]').forEach(b=>b.onclick=()=>{
  $('#deviceSeg').querySelectorAll('button').forEach(x=>x.classList.toggle('on',x===b));
  const d=b.dataset.dev;$('#fwrap').style.maxWidth=DEV[d];$('#previewWrap').classList.toggle('framed',d!=='desktop');
});
/* ── zen / full preview ── */
$('#zenBtn').onclick=()=>{document.body.classList.toggle('zen');$('#zenBtn').classList.toggle('on');};
/* ── selection-scoped AI ── */
function showScope(){const sc=$('#scope');if(sel&&sel.id){sc.className='scope show';sc.innerHTML=`Editing <b>${esc((sel.text||sel.tag||'element').slice(0,28))}</b> <span class="x" id="scopeX">✕</span>`;$('#scopeX').onclick=()=>{sel=null;sc.className='scope';};}else sc.className='scope';}
/* ── first-run guided tour ── */
const TOUR=[
  {el:'#previewWrap',title:'Click anything to edit',body:'Hover any text, button or image — then click it and just type. Changes preview instantly.'},
  {el:'#scope',anchor:'.composer',title:'Or just ask the AI',body:'Describe a change in plain English — “make the headline punchier”. Select something first to scope it.'},
  {el:'#deviceSeg',title:'Check every screen',body:'Preview your site on desktop, tablet and mobile before you publish.'},
  {el:'#saveBtn',anchor:'.bar',title:'Save, then Publish',body:'<b>Save</b> keeps your edits as a draft — nothing changes for visitors. <b>Publish</b> pushes it live. Made a mistake? Roll back any version anytime.'},
];
let tstep=0;
function showTour(){
  const s=TOUR[tstep];const target=document.querySelector(s.el)||document.querySelector('.bar');const r=target.getBoundingClientRect();
  const pad=6;const sx=Math.max(2,r.left-pad),sy=Math.max(2,r.top-pad),sw=r.width+pad*2,sh=r.height+pad*2;
  // coach below the target if room, else above
  const ch=190, below=(sy+sh+ch+20)<window.innerHeight;
  const cTop=below?(sy+sh+14):(sy-ch-14);
  const cLeft=Math.min(Math.max(14,r.left),window.innerWidth-314);
  const arrLeft=Math.min(Math.max(16,(r.left+r.width/2)-cLeft-7),300-30);
  $('#tour').innerHTML=`<div class="spot" style="left:${sx}px;top:${sy}px;width:${sw}px;height:${sh}px"></div>
    <div class="coach" style="left:${cLeft}px;top:${Math.max(8,cTop)}px">
      <button class="cx" id="tClose" title="Close" aria-label="Close">×</button>
      <div class="arr" style="left:${arrLeft}px;${below?'top:-7px':'bottom:-7px'}"></div>
      <h5>${s.title}</h5><p>${s.body}</p>
      <div class="row"><div class="dots">${TOUR.map((_,i)=>`<span class="dot ${i===tstep?'on':''}"></span>`).join('')}</div><div><button class="skip" id="tSkip">Skip</button> <button id="tNext">${tstep<TOUR.length-1?'Next →':'Got it'}</button></div></div>
    </div>`;
  $('#tour').classList.add('show');
  $('#tNext').onclick=()=>{tstep++;if(tstep>=TOUR.length){endTour();}else showTour();};
  $('#tSkip').onclick=endTour;$('#tClose').onclick=endTour;
}
function endTour(){$('#tour').classList.remove('show');localStorage.setItem('cms_tour','1');}
function maybeTour(){if(!localStorage.getItem('cms_tour'))setTimeout(showTour,900);}

$('#pagesBtn').onclick=()=>toggle('#pagesPanel');
$('#histBtn').onclick=()=>{closeMenu();toggle('#histPanel');};
$('#auditBtn').onclick=()=>{closeMenu();const o=!$('#auditPanel').classList.contains('show');toggle('#auditPanel');if(o)loadAudit();};
$('#inboxBtn').onclick=()=>{const o=!$('#formsPanel').classList.contains('show');toggle('#formsPanel');if(o){$('#inboxBtn').classList.add('on');loadForms();}};
$('#seoBtn').onclick=()=>{const willOpen=!$('#seoPanel').classList.contains('show');toggle('#seoPanel');if(willOpen){$('#seoBtn').classList.add('on');loadSeo();}};
init();
</script>
